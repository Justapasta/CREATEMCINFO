<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CREATE PERÚ MC ☢️</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
--red:#e30613;
--green:#22c55e;
--dark:#050505;
--toxic:#39ff14;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',system-ui;
background:black;
color:white;
text-align:center;
overflow-x:hidden;
}

/* GLITCH */
.glitch{
position:relative;
font-weight:900;
font-size:clamp(3rem,10vw,5rem);
}

.glitch::before,.glitch::after{
content:attr(data-text);
position:absolute;
left:0;
width:100%;
overflow:hidden;
}

.glitch::before{
color:#0ff;
animation:glitch1 2s infinite linear alternate-reverse;
}

.glitch::after{
color:#f00;
animation:glitch2 2s infinite linear alternate-reverse;
}

@keyframes glitch1{
0%{clip-path:inset(0 0 90% 0);}
50%{clip-path:inset(40% 0 30% 0);}
100%{clip-path:inset(80% 0 5% 0);}
}

@keyframes glitch2{
0%{clip-path:inset(80% 0 5% 0);}
50%{clip-path:inset(20% 0 50% 0);}
100%{clip-path:inset(0 0 90% 0);}
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle,rgba(57,255,20,0.2),black);
padding:20px;
}

.subtitle{margin:20px 0;opacity:.9}

/* COUNTDOWN */
.countdown{
font-size:1.5rem;
margin:20px 0;
color:var(--toxic);
text-shadow:0 0 10px var(--toxic);
}

/* BUNKER PANEL */
.bunker{
border:1px solid rgba(57,255,20,0.3);
padding:20px;
border-radius:15px;
background:rgba(0,0,0,0.7);
box-shadow:0 0 30px rgba(57,255,20,0.2);
}

/* BOTONES */
.btn{
display:inline-block;
padding:15px 25px;
margin:10px;
border-radius:50px;
font-weight:bold;
text-decoration:none;
transition:.3s;
}

.download{background:var(--green);color:black;}
.discord{background:#5865F2;}

.btn:hover{transform:scale(1.1);}

/* TRAILER */
.trailer iframe{
width:100%;
height:400px;
border-radius:15px;
}

/* CARDS */
.section{padding:60px 20px;}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
margin:20px auto;
max-width:500px;
}

.card:hover{
box-shadow:0 0 30px rgba(57,255,20,0.3);
}

.ip{
background:black;
padding:10px;
margin:10px 0;
border-radius:10px;
font-family:monospace;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<div class="bunker">

<h1 class="glitch" data-text="CREATE PERÚ MC">CREATE PERÚ MC</h1>

<p class="subtitle">
☢️ TEMPORADA 3 ☢️<br>
El mundo colapsó...<br>
Solo lo mecánico sobrevive
</p>

<div class="countdown" id="countdown">Cargando...</div>

<a href="#" id="modpackLink" class="btn download">Descargar Modpack</a>
<a href="https://discord.gg/sT6UbNVuU3" class="btn discord">Discord</a>

</div>
</section>

<!-- TRAILER -->
<div class="section trailer">
<h2>🎬 Trailer</h2>

<iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
</div>

<!-- INFO -->
<div class="section">

<div class="card">
<h2>🌐 IP</h2>
<div class="ip" id="ip">createperumc.bean.pe</div>
<button onclick="copy('ip')" class="btn download">Copiar</button>

<div class="ip" id="ip2">45.58.126.118:24562</div>
<button onclick="copy('ip2')" class="btn download">Copiar</button>
</div>

<div class="card">
<h2>📦 Modpack</h2>
<p>Optimizado para supervivencia post-apocalíptica.</p>
<a href="#" id="modpackLink2" class="btn download">Descargar</a>
</div>

</div>

<script>
// CONFIG
const CONFIG={
modpack:"https://www.mediafire.com/file/hgi895l2vrsjta4/MODPACK_TEMPORADA2_V4.zip/file",
release:"2026-05-01T00:00:00"
};

// MODPACK
document.getElementById("modpackLink").href=CONFIG.modpack;
document.getElementById("modpackLink2").href=CONFIG.modpack;

// COUNTDOWN
const cd=document.getElementById("countdown");
setInterval(()=>{
let diff=new Date(CONFIG.release)-new Date();
if(diff<0){cd.innerHTML="🔥 YA DISPONIBLE 🔥";return;}

let d=Math.floor(diff/86400000);
let h=Math.floor(diff/3600000)%24;
let m=Math.floor(diff/60000)%60;
let s=Math.floor(diff/1000)%60;

cd.innerHTML=`⏳ ${d}d ${h}h ${m}m ${s}s`;
},1000);

// COPY
function copy(id){
navigator.clipboard.writeText(document.getElementById(id).innerText);
alert("Copiado!");
}
</script>

</body>
</html>
